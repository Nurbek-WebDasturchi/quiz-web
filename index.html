<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Universitet Test Tizimi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
    <style>
      .hero-section {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .hero-card {
        background: white;
        border-radius: 1.5rem;
        padding: 3rem;
        max-width: 500px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .hero-logo {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        color: white;
        font-size: 2.5rem;
      }
      .btn-grad {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      .btn-grad:hover {
        transform: translateY(-2px);
        color: white;
      }
      .feature-list {
        text-align: left;
        margin: 1.5rem 0;
      }
      .feature-list li {
        padding: 0.3rem 0;
        color: #555;
      }
      .feature-list i {
        color: #667eea;
        width: 20px;
      }
    </style>
  </head>
  <body>
    <section class="hero-section">
      <div class="hero-card">
        <div class="hero-logo">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="fw-bold mb-2">TestPlatform</h1>
        <p class="text-muted mb-4">
          Universitet test imtihonlari uchun aqlli yechim
        </p>

        <ul class="feature-list list-unstyled">
          <li>
            <i class="fas fa-check-circle me-2"></i><code>.doc</code> fayldan
            avtomatik test yaratish
          </li>
          <li>
            <i class="fas fa-check-circle me-2"></i>To'g'ri javoblarni
            <code>#</code> bilan aniqlash
          </li>
          <li>
            <i class="fas fa-check-circle me-2"></i>Timer, progress bar, natija
            tahlili
          </li>
          <li>
            <i class="fas fa-check-circle me-2"></i>Mobile-friendly, Bootstrap
            UI
          </li>
        </ul>

        <div class="d-grid gap-2 mt-4">
          <button class="btn btn-grad btn-lg" onclick="goToLogin()">
            <i class="fas fa-sign-in-alt me-2"></i>Kirish / Ro'yxatdan o'tish
          </button>
          <button
            class="btn btn-outline-secondary btn-lg rounded-pill"
            onclick="demoMode()">
            <i class="fas fa-play me-2"></i>Demo rejimda sinab ko'rish
          </button>
        </div>

        <p class="small text-muted mt-4 mb-0">
          <i class="fas fa-info-circle me-1"></i>
          Frontend demo • Backend keyinchalik qo'shiladi
        </p>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Check if already logged in
      document.addEventListener("DOMContentLoaded", () => {
        const user = localStorage.getItem("currentUser");
        if (user) {
          // Auto redirect to dashboard after 1 second
          setTimeout(() => (window.location.href = "dashboard.html"), 1000);
        }
      });

      function goToLogin() {
        window.location.href = "login.html";
      }

      function demoMode() {
        const demoUser = {
          name: "Demo Student",
          email: "demo@uz",
          faculty: "IT",
        };
        localStorage.setItem("currentUser", JSON.stringify(demoUser));

        // Create demo test if not exists
        const tests = JSON.parse(localStorage.getItem("tests_demo@uz") || "[]");
        if (tests.length === 0) {
          const demoQuestions = getDemoQuestions();
          tests.push({
            id: "demo_test_1",
            fileName: "Namuna test.doc",
            subject: "Umumiy bilim",
            totalQuestions: demoQuestions.length,
            questions: demoQuestions,
            createdAt: new Date().toISOString(),
          });
          localStorage.setItem("tests_demo@uz", JSON.stringify(tests));
        }

        window.location.href = "dashboard.html";
      }

      function getDemoQuestions() {
        return [
          {
            question: "Dunyoning eng katta qit'asi qaysi?",
            options: [
              { letter: "A", text: "Afrika" },
              { letter: "B", text: "Yevropa" },
              { letter: "C", text: "Osiyo" },
              { letter: "D", text: "Amerika" },
            ],
            correctAnswer: "C",
          },
          {
            question: "2+2=?",
            options: [
              { letter: "A", text: "3" },
              { letter: "B", text: "4" },
              { letter: "C", text: "5" },
              { letter: "D", text: "6" },
            ],
            correctAnswer: "B",
          },
          {
            question: "O'zbekiston poytaxti?",
            options: [
              { letter: "A", text: "Samarqand" },
              { letter: "B", text: "Toshkent" },
              { letter: "C", text: "Buxoro" },
              { letter: "D", text: "Andijon" },
            ],
            correctAnswer: "B",
          },
          {
            question: "Suvning formulasi?",
            options: [
              { letter: "A", text: "CO2" },
              { letter: "B", text: "H2O" },
              { letter: "C", text: "NaCl" },
              { letter: "D", text: "O2" },
            ],
            correctAnswer: "B",
          },
          {
            question: "Eng katta okean?",
            options: [
              { letter: "A", text: "Atlantika" },
              { letter: "B", text: "Hind" },
              { letter: "C", text: "Tinch" },
              { letter: "D", text: "Shimoliy Muz" },
            ],
            correctAnswer: "C",
          },
        ];
      }
    </script>
  </body>
</html>
