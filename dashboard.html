<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizWeb — Bosh sahifa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
  </head>
  <body class="dashboard-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
          <i class="fas fa-graduation-cap me-2"></i>QuizWeb
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard.html"
                ><i class="fas fa-home me-1"></i>Bosh sahifa</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="upload.html"
                ><i class="fas fa-cloud-upload-alt me-1"></i>Test yuklash</a
              >
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <span class="text-white" id="userName"></span>
            <button
              class="btn btn-outline-light btn-sm rounded-pill"
              onclick="logout()">
              <i class="fas fa-sign-out-alt me-1"></i>Chiqish
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
      <!-- Welcome -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card border-0 shadow-sm bg-primary text-white rounded-4">
            <div class="card-body p-4">
              <h3 class="fw-bold mb-1" id="welcomeMsg">Xush kelibsiz! 👋</h3>
              <p class="mb-0 opacity-75">
                Yangi test yuklang yoki mavjud testlarni ishlashni boshlang.
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-4 stat-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center">
                <div
                  class="stat-icon bg-primary bg-opacity-10 rounded-circle p-3 me-3">
                  <i class="fas fa-file-alt text-primary fa-2x"></i>
                </div>
                <div>
                  <h4 class="fw-bold mb-0" id="statTests">0</h4>
                  <p class="text-muted mb-0">Yuklangan testlar</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-4 stat-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center">
                <div
                  class="stat-icon bg-success bg-opacity-10 rounded-circle p-3 me-3">
                  <i class="fas fa-check-circle text-success fa-2x"></i>
                </div>
                <div>
                  <h4 class="fw-bold mb-0" id="statCompleted">0</h4>
                  <p class="text-muted mb-0">Ishlangan testlar</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-4 stat-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center">
                <div
                  class="stat-icon bg-warning bg-opacity-10 rounded-circle p-3 me-3">
                  <i class="fas fa-trophy text-warning fa-2x"></i>
                </div>
                <div>
                  <h4 class="fw-bold mb-0" id="statAvgScore">0%</h4>
                  <p class="text-muted mb-0">O'rtacha ball</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Upload Button -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">
          <i class="fas fa-list-ul me-2 text-primary"></i>Mening testlarim
        </h5>
        <a href="upload.html" class="btn btn-primary rounded-pill px-4">
          <i class="fas fa-plus me-1"></i>Yangi test yuklash
        </a>
      </div>

      <!-- Tests List -->
      <div class="row g-3" id="testsList">
        <!-- Tests will be rendered here -->
      </div>

      <!-- Empty State -->
      <div class="text-center py-5 d-none" id="emptyState">
        <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
        <h5 class="text-muted">Hali testlar yo'q</h5>
        <p class="text-muted">Birinchi testni yuklash uchun tugmani bosing</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
      // Auth check
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) window.location.href = "login.html";

      const role = getUserRole(user);
      document.getElementById("userName").textContent =
        `${user.name} (${getRoleLabel(role)})`;
      document.getElementById("welcomeMsg").textContent =
        role === "teacher"
          ? `Xush kelibsiz, ${user.name}! Ustoz paneli`
          : `Xush kelibsiz, ${user.name}!`;
      document.querySelector(".card.bg-primary p").textContent =
        role === "teacher"
          ? "Testlarni yuklang, AI orqali shablonga keltiring va talabalarga ulashing."
          : "Yangi test yuklang yoki mavjud testlarni ishlashni boshlang.";

      // Load tests
      const tests = JSON.parse(
        localStorage.getItem("tests_" + user.email) || "[]",
      );
      const completed = JSON.parse(
        localStorage.getItem("completed_" + user.email) || "[]",
      );
      const allScores = completed.map((c) => c.percentage);
      const avgScore = allScores.length
        ? Math.round(allScores.reduce((a, b) => a + b, 0) / allScores.length)
        : 0;

      document.getElementById("statTests").textContent = tests.length;
      document.getElementById("statCompleted").textContent = completed.length;
      document.getElementById("statAvgScore").textContent = avgScore + "%";

      const testsList = document.getElementById("testsList");
      const emptyState = document.getElementById("emptyState");

      if (tests.length === 0) {
        emptyState.classList.remove("d-none");
      } else {
        emptyState.classList.add("d-none");
        tests.forEach((test, idx) => {
          const isCompleted = completed.find((c) => c.testId === test.id);
          testsList.innerHTML += `
          <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <div class="bg-primary bg-opacity-10 rounded-pill px-3 py-1">
                    <small class="text-primary fw-semibold">${test.subject || "Fan"}</small>
                  </div>
                  ${isCompleted ? '<span class="badge bg-success rounded-pill"><i class="fas fa-check me-1"></i>Ishlangan</span>' : '<span class="badge bg-secondary rounded-pill">Kutilmoqda</span>'}
                </div>
                <h5 class="fw-bold mb-2">${test.fileName}</h5>
                <p class="text-muted small mb-3">
                  <i class="fas fa-question-circle me-1"></i>${test.totalQuestions} ta savol &bull;
                  <i class="fas fa-users me-1"></i>${test.totalQuestions > 50 ? 50 : test.totalQuestions} ta tasodifiy
                </p>
                ${
                  isCompleted
                    ? `
                  <div class="d-flex gap-2">
                    <a href="result.html?id=${isCompleted.resultId}" class="btn btn-outline-primary btn-sm rounded-pill flex-grow-1">
                      <i class="fas fa-chart-bar me-1"></i>Natija
                    </a>
                    <button class="btn btn-outline-success btn-sm rounded-pill" onclick="startTest('${test.id}')">
                      <i class="fas fa-redo me-1"></i>Qayta ishlash
                    </button>
                  </div>
                `
                    : `
                  <button class="btn btn-primary btn-sm rounded-pill w-100" onclick="startTest('${test.id}')">
                    <i class="fas fa-play me-1"></i>Testni boshlash
                  </button>
                `
                }
                <div class="mt-2">
                  <button class="btn btn-outline-secondary btn-sm rounded-pill w-100" onclick="shareTest('${test.id}')">
                    <i class="fas fa-share-alt me-1"></i>Ulashish
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
        });
      }

      function startTest(testId) {
        const tests = JSON.parse(
          localStorage.getItem("tests_" + user.email) || "[]",
        );
        const test = tests.find((t) => t.id === testId);
        if (test) {
          localStorage.setItem("currentTest", JSON.stringify(test));
          window.location.href = "test.html";
        }
      }

      function shareTest(testId) {
        const shareUrl = window.location.origin + "/test.html?share=" + testId;
        navigator.clipboard
          .writeText(shareUrl)
          .then(() => {
            showAlert("success", "Havola nusxalandi: " + shareUrl);
          })
          .catch(() => {
            showAlert("info", "Havola: " + shareUrl);
          });
      }

      function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
