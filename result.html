<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Natija</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
  </head>
  <body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="./dashboard.html">
          <i class="fas fa-graduation-cap me-2"></i>TestPlatform
        </a>
        <div class="d-flex align-items-center gap-3">
          <a
            href="./dashboard.html"
            class="btn btn-outline-light btn-sm rounded-pill">
            <i class="fas fa-home me-1"></i>Bosh sahifa
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Result Summary -->
          <div class="card border-0 shadow-sm rounded-4 mb-4" id="resultCard">
            <div class="card-body p-5 text-center">
              <div class="mb-3">
                <i class="fas fa-trophy fa-4x text-warning" id="resultIcon"></i>
              </div>
              <h2 class="fw-bold mb-1" id="resultGrade">Zo'r!</h2>
              <p class="text-muted mb-4" id="resultSubject">Fan nomi</p>

              <div class="row g-3 mb-4">
                <div class="col-4">
                  <div class="p-3 bg-success bg-opacity-10 rounded-3">
                    <h3 class="fw-bold text-success mb-0" id="resultCorrect">
                      0
                    </h3>
                    <small class="text-muted">To'g'ri</small>
                  </div>
                </div>
                <div class="col-4">
                  <div class="p-3 bg-danger bg-opacity-10 rounded-3">
                    <h3 class="fw-bold text-danger mb-0" id="resultWrong">0</h3>
                    <small class="text-muted">Noto'g'ri</small>
                  </div>
                </div>
                <div class="col-4">
                  <div class="p-3 bg-info bg-opacity-10 rounded-3">
                    <h3 class="fw-bold text-info mb-0" id="resultTime">
                      0m 0s
                    </h3>
                    <small class="text-muted">Vaqt</small>
                  </div>
                </div>
              </div>

              <!-- Circular Progress -->
              <div class="d-flex justify-content-center mb-4">
                <div
                  class="position-relative"
                  style="width: 180px; height: 180px">
                  <svg viewBox="0 0 180 180" class="w-100 h-100">
                    <circle
                      cx="90"
                      cy="90"
                      r="80"
                      fill="none"
                      stroke="#e9ecef"
                      stroke-width="12" />
                    <circle
                      cx="90"
                      cy="90"
                      r="80"
                      fill="none"
                      stroke="var(--score-color, #0d6efd)"
                      stroke-width="12"
                      stroke-dasharray="502"
                      stroke-dashoffset="502"
                      stroke-linecap="round"
                      transform="rotate(-90 90 90)"
                      id="scoreCircle"
                      style="transition: stroke-dashoffset 1.5s ease" />
                  </svg>
                  <div
                    class="position-absolute top-50 start-50 translate-middle text-center">
                    <h2
                      class="fw-bold mb-0"
                      id="resultPercentage"
                      style="color: var(--score-color, #0d6efd)">
                      0%
                    </h2>
                    <small class="text-muted">Natija</small>
                  </div>
                </div>
              </div>

              <div class="d-flex gap-2 justify-content-center">
                <button
                  class="btn btn-primary rounded-pill px-4"
                  onclick="reviewAnswers()">
                  <i class="fas fa-eye me-1"></i>Javoblarni ko'rish
                </button>
                <button
                  class="btn btn-outline-success rounded-pill px-4"
                  onclick="window.location.href = 'dashboard.html'">
                  <i class="fas fa-home me-1"></i>Bosh sahifa
                </button>
              </div>
            </div>
          </div>

          <!-- Review Section -->
          <div class="card border-0 shadow-sm rounded-4 d-none" id="reviewCard">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-4">
                <i class="fas fa-clipboard-list text-primary me-2"></i>Javoblar
                tahlili
              </h5>
              <div id="reviewContainer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) window.location.href = "./login.html";

      const result = JSON.parse(localStorage.getItem("currentResult"));
      if (!result) {
        window.location.href = "./dashboard.html";
      }

      // Display results
      document.getElementById("resultSubject").textContent = result.subject;
      document.getElementById("resultCorrect").textContent = result.correct;
      document.getElementById("resultWrong").textContent = result.wrong;
      document.getElementById("resultTime").textContent = result.timeSpent;
      document.getElementById("resultPercentage").textContent =
        result.percentage + "%";

      // Score color & grade
      let scoreColor, grade, icon;
      if (result.percentage >= 90) {
        scoreColor = "#198754";
        grade = "A'lo! 🎉";
        icon = "fa-trophy";
      } else if (result.percentage >= 75) {
        scoreColor = "#0d6efd";
        grade = "Yaxshi! 👍";
        icon = "fa-star";
      } else if (result.percentage >= 60) {
        scoreColor = "#ffc107";
        grade = "Qoniqarli 📚";
        icon = "fa-book";
      } else {
        scoreColor = "#dc3545";
        grade = "Qayta urinib ko'ring 💪";
        icon = "fa-redo";
      }

      document.getElementById("resultGrade").textContent = grade;
      document.getElementById("resultIcon").className = `fas ${icon} fa-4x`;
      document.getElementById("resultIcon").style.color = scoreColor;
      document.getElementById("resultPercentage").style.color = scoreColor;
      document.getElementById("scoreCircle").style.stroke = scoreColor;
      document.documentElement.style.setProperty("--score-color", scoreColor);

      // Animate circle
      setTimeout(() => {
        const circumference = 2 * Math.PI * 80;
        const offset =
          circumference - (result.percentage / 100) * circumference;
        document.getElementById("scoreCircle").style.strokeDashoffset = offset;
      }, 300);

      // Review answers
      function reviewAnswers() {
        const card = document.getElementById("reviewCard");
        const container = document.getElementById("reviewContainer");
        card.classList.remove("d-none");
        container.innerHTML = "";

        result.details.forEach((d, i) => {
          const statusClass = d.isCorrect ? "border-success" : "border-danger";
          const statusBadge = d.isCorrect
            ? '<span class="badge bg-success"><i class="fas fa-check me-1"></i>To\'g\'ri</span>'
            : '<span class="badge bg-danger"><i class="fas fa-times me-1"></i>Noto\'g\'ri</span>';

          container.innerHTML += `
          <div class="card ${statusClass} border mb-3 rounded-3">
            <div class="card-body p-3">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="fw-bold mb-0">${i + 1}. ${d.question}</h6>
                ${statusBadge}
              </div>
              <div class="small">
                <div>Sizning javob: <strong class="${d.isCorrect ? "text-success" : "text-danger"}">${d.userAnswer || "Javob yo'q"}</strong></div>
                ${!d.isCorrect ? `<div class="mt-1">To'g'ri javob: <strong class="text-success">${d.correctAnswer}</strong></div>` : ""}
              </div>
            </div>
          </div>
        `;
        });

        card.scrollIntoView({ behavior: "smooth" });
      }
    </script>
  </body>
</html>
