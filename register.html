<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Ro'yxatdan o'tish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
    <style>
      .btn-google {
        background: #fff;
        border: 2px solid #dadce0;
        color: #3c4043;
        font-weight: 600;
        transition: box-shadow 0.2s, border-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 0.7rem 1.5rem;
        border-radius: 0.55rem;
        width: 100%;
        font-size: 1rem;
        cursor: pointer;
      }
      .btn-google:hover {
        box-shadow: 0 2px 12px rgba(60,64,67,.2);
        border-color: #4361ee;
      }
      .btn-google img { width: 22px; height: 22px; }
      .divider { display: flex; align-items: center; gap: 1rem; }
      .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid #dee2e6; }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-container d-flex align-items-center justify-content-center min-vh-100">
      <div class="auth-card card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="auth-logo mb-3">
              <i class="fas fa-user-plus fa-3x text-success"></i>
            </div>
            <h2 class="fw-bold text-dark">Ro'yxatdan o'tish</h2>
            <p class="text-muted">Yangi akkaunt yarating</p>
          </div>

          <!-- Google Register Button -->
          <div class="mb-4">
            <button class="btn-google" id="googleBtn" onclick="registerWithGoogle()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
              Google orqali ro'yxatdan o'tish
            </button>
          </div>

          <div class="divider mb-4">
            <span class="text-muted small">yoki email bilan</span>
          </div>

          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">To'liq ism</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control form-control-lg" id="regName"
                  placeholder="Ism Familiya" required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control form-control-lg" id="regEmail"
                  placeholder="student@university.uz" required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Fakultet</label>
              <select class="form-select form-select-lg" id="regFaculty" required>
                <option value="" disabled selected>Tanlang...</option>
                <option value="IT">Axborot texnologiyalari</option>
                <option value="Iqtisodiyot">Iqtisodiyot</option>
                <option value="Huquq">Huquqshunoslik</option>
                <option value="Tibbiyot">Tibbiyot</option>
                <option value="Pedagogika">Pedagogika</option>
                <option value="Muhandislik">Muhandislik</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Rol</label>
              <select class="form-select form-select-lg" id="regRole" required>
                <option value="student" selected>Talaba</option>
                <option value="teacher">Ustoz</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Parol</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control form-control-lg" id="regPassword"
                  placeholder="Kamida 6 ta belgi" required minlength="6" />
                <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="form-text text-muted">Kamida 6 ta belgi kiriting</div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg rounded-pill">
                <i class="fas fa-user-check me-2"></i>Ro'yxatdan o'tish
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted">
              Akkauntingiz bormi?
              <a href="./login.html" class="text-primary fw-semibold">Kirish</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!--
      ================================================================
      FIREBASE SDK
      ⚠️ assets/js/firebase-config.js faylida FIREBASE_CONFIG ni
         o'zingizning ma'lumotlaringiz bilan to'ldiring!
      ================================================================
    -->
    <script src="assets/js/firebase-config.js"></script>
    <script type="module">
      import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult }
                                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const app      = initializeApp(window.FIREBASE_CONFIG || FIREBASE_CONFIG);
      const auth     = getAuth(app);
      const provider = new GoogleAuthProvider();

      window._firebaseAuth    = auth;
      window._googleProvider  = provider;
      window._signInWithPopup = signInWithPopup;
      window._signInWithRedirect = signInWithRedirect;

      getRedirectResult(auth).then((result) => {
        if (!result?.user) return;
        const firebaseUser = result.user;
        const role = localStorage.getItem("pendingGoogleRole") || "student";
        localStorage.removeItem("pendingGoogleRole");
        const user = {
          name: firebaseUser.displayName || firebaseUser.email,
          email: firebaseUser.email,
          photo: firebaseUser.photoURL,
          faculty: "Google",
          role,
          googleUid: firebaseUser.uid
        };
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        if (!users.find(u => u.email === user.email)) {
          users.push(user);
          localStorage.setItem("users", JSON.stringify(users));
        }
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
      }).catch((err) => {
        console.error("Google redirect register xatosi:", err);
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
      async function registerWithGoogle() {
        const btn = document.getElementById("googleBtn");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Yuklanmoqda...`;

        try {
          if (!window._firebaseAuth || !window._signInWithPopup) {
            showGoogleFallback(); return;
          }
          const role = confirm("Ustoz sifatida ro'yxatdan o'tasizmi?") ? "teacher" : "student";
          localStorage.setItem("pendingGoogleRole", role);
          const result       = await window._signInWithPopup(window._firebaseAuth, window._googleProvider);
          const firebaseUser = result.user;
          const user = {
            name:      firebaseUser.displayName || firebaseUser.email,
            email:     firebaseUser.email,
            photo:     firebaseUser.photoURL,
            faculty:   "Google",
            role,
            googleUid: firebaseUser.uid
          };
          const users = JSON.parse(localStorage.getItem("users") || "[]");
          if (!users.find(u => u.email === user.email)) {
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
          }
          localStorage.setItem("currentUser", JSON.stringify(user));
          showAlert("success", "Google orqali muvaffaqiyatli ro'yxatdan o'tdingiz!");
          setTimeout(() => window.location.href = "dashboard.html", 800);

        } catch (err) {
          console.error("Google register xatosi:", err);
          if (
            err.code === "auth/api-key-not-valid" ||
            err.code === "auth/invalid-api-key" ||
            err.message?.includes("api-key") ||
            err.message?.includes("YOUR_API_KEY")
          ) {
            showGoogleFallback(); return;
          }
          if (err.code === "auth/popup-blocked" || err.code === "auth/cancelled-popup-request") {
            showAlert("info", "Popup bloklandi. Google sahifasiga yo'naltirilmoqda...");
            await window._signInWithRedirect(window._firebaseAuth, window._googleProvider);
            return;
          }
          if (err.code !== "auth/popup-closed-by-user") {
            showAlert("danger", "Xato: " + (err.message || err.code));
          }
          btn.disabled = false;
          btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:22px;height:22px" alt="Google" /> Google orqali ro'yxatdan o'tish`;
        }
      }

      function showGoogleFallback() {
        const name = prompt(
          "⚠️ Firebase hali sozlanmagan.\n\nDemo uchun ismingizni kiriting:",
          "Ali Valiyev"
        );
        if (name) {
          const email = name.toLowerCase().replace(/\s+/g, ".") + "@gmail.com";
          const role = confirm("Ustoz sifatida ro'yxatdan o'tasizmi?") ? "teacher" : "student";
          const user  = { name, email, faculty: "Google", photo: null, role };
          const users = JSON.parse(localStorage.getItem("users") || "[]");
          if (!users.find(u => u.email === user.email)) {
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
          }
          localStorage.setItem("currentUser", JSON.stringify(user));
          showAlert("success", "Demo Google ro'yxat muvaffaqiyatli!");
          setTimeout(() => window.location.href = "dashboard.html", 800);
        } else {
          const btn = document.getElementById("googleBtn");
          btn.disabled = false;
          btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:22px;height:22px" alt="Google" /> Google orqali ro'yxatdan o'tish`;
        }
      }

      document.getElementById("togglePwd").addEventListener("click", function () {
        const pwd  = document.getElementById("regPassword");
        const icon = this.querySelector("i");
        if (pwd.type === "password") { pwd.type = "text";     icon.className = "fas fa-eye-slash"; }
        else                         { pwd.type = "password"; icon.className = "fas fa-eye"; }
      });

      document.getElementById("registerForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const name     = document.getElementById("regName").value.trim();
        const email    = document.getElementById("regEmail").value.trim();
        const faculty  = document.getElementById("regFaculty").value;
        const role     = document.getElementById("regRole").value;
        const password = document.getElementById("regPassword").value;

        const users = JSON.parse(localStorage.getItem("users") || "[]");
        if (users.find((u) => u.email === email)) {
          showAlert("danger", "Bu email allaqachon ro'yxatdan o'tgan!"); return;
        }
        const user = { name, email, faculty, role, password, createdAt: new Date().toISOString() };
        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("currentUser", JSON.stringify(user));
        showAlert("success", "Muvaffaqiyatli ro'yxatdan o'tdingiz!");
        setTimeout(() => (window.location.href = "dashboard.html"), 800);
      });
    </script>
  </body>
</html>
