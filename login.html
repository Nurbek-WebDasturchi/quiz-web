<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
    <style>
      .btn-google {
        background: #fff;
        border: 2px solid #dadce0;
        color: #3c4043;
        font-weight: 600;
        transition: box-shadow 0.2s, border-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 0.7rem 1.5rem;
        border-radius: 50px;
        width: 100%;
        font-size: 1rem;
        cursor: pointer;
      }
      .btn-google:hover {
        box-shadow: 0 2px 12px rgba(60,64,67,.2);
        border-color: #4361ee;
      }
      .btn-google img { width: 22px; height: 22px; }
      .divider { display: flex; align-items: center; gap: 1rem; }
      .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid #dee2e6; }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-container d-flex align-items-center justify-content-center min-vh-100">
      <div class="auth-card card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="auth-logo mb-3">
              <i class="fas fa-graduation-cap fa-3x text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark">TestPlatform</h2>
            <p class="text-muted">Universitet test tizimi</p>
          </div>

          <!-- Google Login Button -->
          <div class="mb-4">
            <button class="btn-google" id="googleBtn" onclick="loginWithGoogle()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
              Google orqali kirish
            </button>
          </div>

          <div class="divider mb-4">
            <span class="text-muted small">yoki email bilan</span>
          </div>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control form-control-lg" id="loginEmail"
                  placeholder="student@university.uz" required />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Parol</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control form-control-lg" id="loginPassword"
                  placeholder="••••••••" required />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                <i class="fas fa-sign-in-alt me-2"></i>Kirish
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted">
              Akkauntingiz yo'qmi?
              <a href="./register.html" class="text-primary fw-semibold">Ro'yxatdan o'ting</a>
            </p>
          </div>

          <div class="divider my-3">
            <span class="text-muted small">Demo uchun</span>
          </div>
          <div class="text-center">
            <button class="btn btn-outline-secondary btn-sm rounded-pill" onclick="demoLogin()">
              <i class="fas fa-play me-1"></i>Demo talaba
            </button>
            <button class="btn btn-outline-primary btn-sm rounded-pill ms-2" onclick="demoTeacherLogin()">
              <i class="fas fa-chalkboard-user me-1"></i>Demo ustoz
            </button>
          </div>
        </div>
      </div>
    </div>

    <!--
      ================================================================
      FIREBASE SDK — type="module" ishlatiladi
      ⚠️ assets/js/firebase-config.js faylida FIREBASE_CONFIG ni
         o'zingizning ma'lumotlaringiz bilan to'ldiring!
      ================================================================
    -->
    <script src="assets/js/firebase-config.js"></script>
    <script type="module">
      import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged }
                                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      // firebase-config.js dan olingan FIREBASE_CONFIG global o'zgaruvchisi
      const app      = initializeApp(window.FIREBASE_CONFIG || FIREBASE_CONFIG);
      const auth     = getAuth(app);
      const provider = new GoogleAuthProvider();

      // Global scope ga chiqaramiz (module bo'lmagan scriptlar uchun)
      window._firebaseAuth      = auth;
      window._googleProvider    = provider;
      window._signInWithPopup   = signInWithPopup;
      window._signInWithRedirect = signInWithRedirect;

      getRedirectResult(auth).then((result) => {
        if (!result?.user) return;
        const firebaseUser = result.user;
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        const existingUser = users.find((u) => u.email === firebaseUser.email);
        const user = existingUser || {
          name: firebaseUser.displayName || firebaseUser.email,
          email: firebaseUser.email,
          photo: firebaseUser.photoURL,
          faculty: "Google",
          role: "student",
          googleUid: firebaseUser.uid
        };
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
      }).catch((err) => {
        console.error("Google redirect login xatosi:", err);
      });

      // Agar allaqachon tizimga kirgan bo'lsa, dashboardga yo'naltir
      onAuthStateChanged(auth, (firebaseUser) => {
        if (firebaseUser) {
          const users = JSON.parse(localStorage.getItem("users") || "[]");
          const existingUser = users.find((u) => u.email === firebaseUser.email);
          const user = existingUser || {
            name:      firebaseUser.displayName || firebaseUser.email,
            email:     firebaseUser.email,
            photo:     firebaseUser.photoURL,
            faculty:   "Google",
            role:      "student",
            googleUid: firebaseUser.uid
          };
          localStorage.setItem("currentUser", JSON.stringify(user));
          window.location.href = "dashboard.html";
        }
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      // Agar localStorage da foydalanuvchi bo'lsa, dashboardga o'tkazamiz
      document.addEventListener("DOMContentLoaded", () => {
        const user = localStorage.getItem("currentUser");
        if (user) window.location.href = "dashboard.html";
      });

      async function loginWithGoogle() {
        const btn = document.getElementById("googleBtn");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Yuklanmoqda...`;

        try {
          // Firebase hali tayyor emasligini tekshiramiz
          if (!window._firebaseAuth || !window._signInWithPopup) {
            showGoogleFallback();
            return;
          }

          const result      = await window._signInWithPopup(window._firebaseAuth, window._googleProvider);
          const firebaseUser = result.user;
          const users = JSON.parse(localStorage.getItem("users") || "[]");
          const existingUser = users.find((u) => u.email === firebaseUser.email);
          const user = existingUser || {
            name:      firebaseUser.displayName || firebaseUser.email,
            email:     firebaseUser.email,
            photo:     firebaseUser.photoURL,
            faculty:   "Google",
            role:      "student",
            googleUid: firebaseUser.uid
          };
          localStorage.setItem("currentUser", JSON.stringify(user));
          showAlert("success", "Google orqali muvaffaqiyatli kirdingiz!");
          setTimeout(() => window.location.href = "dashboard.html", 800);

        } catch (err) {
          console.error("Google login xatosi:", err);

          // API key noto'g'ri yoki Firebase sozlanmagan
          if (
            err.code === "auth/api-key-not-valid" ||
            err.code === "auth/invalid-api-key" ||
            err.message?.includes("api-key") ||
            err.message?.includes("YOUR_API_KEY")
          ) {
            showGoogleFallback();
            return;
          }

          // Foydalanuvchi o'zi popup ni yopdi — xato ko'rsatmaymiz
          if (err.code === "auth/popup-closed-by-user") {
            btn.disabled = false;
            btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:22px;height:22px" alt="Google" /> Google orqali kirish`;
            return;
          }
          if (err.code === "auth/popup-blocked" || err.code === "auth/cancelled-popup-request") {
            showAlert("info", "Popup bloklandi. Google sahifasiga yo'naltirilmoqda...");
            await window._signInWithRedirect(window._firebaseAuth, window._googleProvider);
            return;
          }

          // Boshqa xatolar
          showAlert("danger", "Google kirish xatosi: " + (err.message || err.code));
          btn.disabled = false;
          btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:22px;height:22px" alt="Google" /> Google orqali kirish`;
        }
      }

      // Firebase sozlanmagan bo'lsa — demo simulatsiyasi
      function showGoogleFallback() {
        const name = prompt(
          "⚠️ Firebase hali sozlanmagan.\n\nDemo uchun ismingizni kiriting (Google login simulatsiyasi):",
          "Ali Valiyev"
        );
        if (name) {
          const email = name.toLowerCase().replace(/\s+/g, ".") + "@gmail.com";
          const user  = { name, email, faculty: "Google", photo: null, role: "student" };
          localStorage.setItem("currentUser", JSON.stringify(user));
          showAlert("success", "Demo Google kirish muvaffaqiyatli!");
          setTimeout(() => window.location.href = "dashboard.html", 800);
        } else {
          const btn = document.getElementById("googleBtn");
          btn.disabled = false;
          btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:22px;height:22px" alt="Google" /> Google orqali kirish`;
        }
      }

      // Email/parol bilan kirish
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const email    = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const users    = JSON.parse(localStorage.getItem("users") || "[]");
        const user     = users.find((u) => u.email === email && u.password === password);
        if (user) {
          localStorage.setItem("currentUser", JSON.stringify(user));
          window.location.href = "dashboard.html";
        } else {
          showAlert("danger", "Email yoki parol noto'g'ri!");
        }
      });

      // Parolni ko'rsatish/yashirish
      document.getElementById("togglePassword").addEventListener("click", function () {
        const pwd  = document.getElementById("loginPassword");
        const icon = this.querySelector("i");
        if (pwd.type === "password") { pwd.type = "text";     icon.className = "fas fa-eye-slash"; }
        else                         { pwd.type = "password"; icon.className = "fas fa-eye"; }
      });

      // Demo kirish
      function demoLogin() {
        const demoUser = { name: "Demo Student", email: "demo@uz", faculty: "IT", role: "student" };
        localStorage.setItem("currentUser", JSON.stringify(demoUser));
        window.location.href = "dashboard.html";
      }

      function demoTeacherLogin() {
        const demoUser = { name: "Demo Ustoz", email: "teacher@uz", faculty: "IT", role: "teacher" };
        localStorage.setItem("currentUser", JSON.stringify(demoUser));
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
