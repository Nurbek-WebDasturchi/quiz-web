<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Test ishlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="assets/css/styling.css" rel="stylesheet" />
    <style>
      .option-btn {
        border: 2px solid #dee2e6;
        transition: border-color 0.15s, background 0.15s, color 0.15s;
        text-align: left;
        font-size: 1rem;
        padding: 0.85rem 1.2rem;
        border-radius: 0.75rem !important;
        cursor: pointer;
        background: #fff;
        color: #212529;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      .option-btn:hover:not(.selected) {
        border-color: #4361ee;
        background: #eef0ff;
      }
      .option-btn.selected {
        border-color: #4361ee !important;
        background: #4361ee !important;
        color: #fff !important;
      }
      .option-btn.selected .opt-badge {
        background: rgba(255,255,255,0.25) !important;
        color: #fff !important;
      }
      .opt-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        font-weight: 700;
        font-size: 0.85rem;
        background: #f0f2f5;
        color: #4361ee;
        flex-shrink: 0;
      }
      #timer { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
      #timer.warning { color: #e71d36 !important; }
      #timer.ok { color: #2ec4b6; }
      .q-nav-btn {
        width: 36px; height: 36px; padding: 0;
        font-size: 0.8rem; font-weight: 600; border-radius: 50% !important;
      }
    </style>
  </head>
  <body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
          <i class="fas fa-graduation-cap me-2"></i>TestPlatform
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white fw-semibold" id="testSubject"></span>
          <a href="dashboard.html" class="btn btn-outline-light btn-sm rounded-pill"
            onclick="return confirm('Testdan chiqmoqchimisiz? Natijalar saqlanmaydi!');">
            <i class="fas fa-times me-1"></i>Chiqish
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <!-- Timer & Progress -->
      <div class="row mb-3 g-3">
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3 h-100">
            <div class="card-body p-3 text-center d-flex flex-column justify-content-center">
              <small class="text-muted d-block mb-1">⏱ Qolgan vaqt</small>
              <div id="timer" class="ok">50:00</div>
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card border-0 shadow-sm rounded-3 h-100">
            <div class="card-body p-3 d-flex flex-column justify-content-center">
              <div class="d-flex justify-content-between mb-1">
                <small class="fw-semibold">Javob berilgan savollar</small>
                <small class="text-primary fw-bold" id="progressText">0 / 0</small>
              </div>
              <div class="progress" style="height: 10px; border-radius: 10px;">
                <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated"
                  id="progressBar" style="width: 0%; border-radius: 10px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4" id="questionCard">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="badge bg-primary rounded-pill fs-6" id="questionNumber">Savol 1</span>
                <span class="text-muted small" id="questionCount"></span>
              </div>

              <h5 class="fw-bold mb-4" id="questionText">Yuklanmoqda...</h5>

              <div id="optionsContainer" class="d-flex flex-column gap-2 mb-4">
                <!-- Options rendered here -->
              </div>

              <div class="d-flex justify-content-between">
                <button class="btn btn-outline-secondary rounded-pill px-4" id="prevBtn"
                  onclick="prevQuestion()" disabled>
                  <i class="fas fa-arrow-left me-1"></i>Oldingi
                </button>
                <button class="btn btn-primary rounded-pill px-4" id="nextBtn" onclick="nextQuestion()">
                  Keyingi<i class="fas fa-arrow-right ms-1"></i>
                </button>
                <button class="btn btn-success rounded-pill px-4 d-none" id="finishBtn"
                  onclick="finishTest()">
                  <i class="fas fa-check me-1"></i>Tugatish
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Navigator -->
      <div class="row justify-content-center mt-3">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
              <h6 class="fw-bold mb-2">
                <i class="fas fa-th me-2"></i>Savollar xaritasi
                <span class="text-muted small fw-normal ms-2">
                  <span class="badge bg-primary">Joriy</span>
                  <span class="badge bg-success ms-1">Javob berilgan</span>
                  <span class="badge bg-secondary ms-1">Javob berilmagan</span>
                </span>
              </h6>
              <div class="d-flex flex-wrap gap-2" id="questionNav"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) window.location.href = "login.html";

      const test = JSON.parse(localStorage.getItem("currentTest"));
      if (!test) window.location.href = "dashboard.html";

      document.getElementById("testSubject").textContent = test.subject;

      // Prepare questions — shuffle ORDER of questions, but fix option order per question
      const allQuestions = test.questions;
      const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
      const selectedQuestions = shuffled.slice(0, 50);
      const totalQ = selectedQuestions.length;

      // For each question, store its shuffled options ONCE so they never re-shuffle on re-render
      const questionOptions = selectedQuestions.map((q) => {
        return [...q.options].sort(() => Math.random() - 0.5);
      });

      let currentQ = 0;
      let answers = new Array(totalQ).fill(null);
      let timerInterval;
      const TOTAL_SECONDS = 50 * 60; // 50 minutes
      let timeLeft = TOTAL_SECONDS;

      // Build question navigator
      const navContainer = document.getElementById("questionNav");
      for (let i = 0; i < totalQ; i++) {
        const btn = document.createElement("button");
        btn.className = "btn btn-sm q-nav-btn btn-outline-secondary";
        btn.dataset.index = i;
        btn.textContent = i + 1;
        btn.onclick = () => goToQuestion(i);
        navContainer.appendChild(btn);
      }

      function renderQuestion() {
        const q = selectedQuestions[currentQ];
        document.getElementById("questionNumber").textContent = `Savol ${currentQ + 1}`;
        document.getElementById("questionCount").textContent = `${currentQ + 1} / ${totalQ}`;
        document.getElementById("questionText").textContent = q.question;

        // Use the PRE-SHUFFLED options for this question (never re-shuffle)
        const opts = questionOptions[currentQ];
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";

        opts.forEach((opt) => {
          const isSelected = answers[currentQ] === opt.letter;
          const btn = document.createElement("button");
          btn.className = "option-btn" + (isSelected ? " selected" : "");
          btn.dataset.letter = opt.letter;
          btn.innerHTML = `<span class="opt-badge">${opt.letter}</span><span>${opt.text}</span>`;
          btn.onclick = () => selectAnswer(opt.letter);
          container.appendChild(btn);
        });

        // Navigation buttons
        document.getElementById("prevBtn").disabled = currentQ === 0;
        if (currentQ === totalQ - 1) {
          document.getElementById("nextBtn").classList.add("d-none");
          document.getElementById("finishBtn").classList.remove("d-none");
        } else {
          document.getElementById("nextBtn").classList.remove("d-none");
          document.getElementById("finishBtn").classList.add("d-none");
        }

        updateProgress();
        updateNav();
      }

      function selectAnswer(letter) {
        answers[currentQ] = letter;

        // Update only the visual state of buttons — NO re-render (no re-shuffle)
        document.querySelectorAll(".option-btn").forEach((btn) => {
          if (btn.dataset.letter === letter) {
            btn.classList.add("selected");
          } else {
            btn.classList.remove("selected");
          }
        });

        updateProgress();
        updateNav();
      }

      function nextQuestion() {
        if (currentQ < totalQ - 1) { currentQ++; renderQuestion(); }
      }

      function prevQuestion() {
        if (currentQ > 0) { currentQ--; renderQuestion(); }
      }

      function goToQuestion(idx) {
        currentQ = idx;
        renderQuestion();
      }

      function updateProgress() {
        const answered = answers.filter((a) => a !== null).length;
        const pct = (answered / totalQ) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent = `${answered} / ${totalQ}`;
      }

      function updateNav() {
        document.querySelectorAll(".q-nav-btn").forEach((btn) => {
          const idx = parseInt(btn.dataset.index);
          btn.className = "btn btn-sm q-nav-btn";
          if (idx === currentQ) btn.classList.add("btn-primary");
          else if (answers[idx] !== null) btn.classList.add("btn-success");
          else btn.classList.add("btn-outline-secondary");
        });
      }

      // ================= TIMER =================
      function updateTimerDisplay() {
        const min = Math.floor(timeLeft / 60).toString().padStart(2, "0");
        const sec = (timeLeft % 60).toString().padStart(2, "0");
        const el = document.getElementById("timer");
        el.textContent = `${min}:${sec}`;
        if (timeLeft <= 300) {        // last 5 min
          el.className = "warning";
        } else if (timeLeft <= 600) { // last 10 min
          el.className = "text-warning fw-bold";
        } else {
          el.className = "ok";
        }
      }

      function startTimer() {
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Vaqt tugadi! Test avtomatik yakunlanmoqda...");
            finishTest();
          }
        }, 1000);
      }

      // ================= FINISH =================
      function finishTest() {
        clearInterval(timerInterval);

        let correct = 0, wrong = 0;
        const details = [];

        selectedQuestions.forEach((q, i) => {
          const isCorrect = answers[i] === q.correctAnswer;
          if (isCorrect) correct++; else wrong++;
          details.push({
            question: q.question,
            userAnswer: answers[i],
            correctAnswer: q.correctAnswer,
            isCorrect,
            options: questionOptions[i], // use the displayed order
          });
        });

        const percentage = Math.round((correct / totalQ) * 100);
        const timeSpent = TOTAL_SECONDS - timeLeft;
        const minutes = Math.floor(timeSpent / 60);
        const seconds = timeSpent % 60;

        const result = {
          resultId: "result_" + Date.now(),
          testId: test.id,
          subject: test.subject,
          totalQuestions: totalQ,
          correct,
          wrong,
          unanswered: totalQ - correct - wrong,
          percentage,
          timeSpent: `${minutes}m ${seconds}s`,
          details,
          answers,
          selectedQuestions,
          completedAt: new Date().toISOString(),
        };

        const completed = JSON.parse(localStorage.getItem("completed_" + user.email) || "[]");
        completed.push(result);
        localStorage.setItem("completed_" + user.email, JSON.stringify(completed));
        localStorage.setItem("currentResult", JSON.stringify(result));

        window.location.href = "result.html";
      }

      // ================= INIT =================
      renderQuestion();
      startTimer();
    </script>
  </body>
</html>
