<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizWeb — Test ishlash</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="assets/css/styling.css" rel="stylesheet" />
    <style>
      .option-btn {
        border: 2px solid #dee2e6;
        transition:
          border-color 0.15s,
          background 0.15s,
          color 0.15s;
        text-align: left;
        font-size: 1rem;
        padding: 0.85rem 1.2rem;
        border-radius: 0.5rem !important;
        cursor: pointer;
        background: #fff;
        color: #212529;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      .option-btn:hover:not(.selected) {
        border-color: #4361ee;
        background: #eef0ff;
      }
      .option-btn:disabled {
        cursor: default;
        opacity: 1;
      }
      .option-btn.selected {
        border-color: #4361ee !important;
        background: #4361ee !important;
        color: #fff !important;
      }
      .option-btn.correct {
        border-color: #198754 !important;
        background: #d1e7dd !important;
        color: #0f5132 !important;
      }
      .option-btn.incorrect {
        border-color: #dc3545 !important;
        background: #f8d7da !important;
        color: #842029 !important;
      }
      #timer {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      #timer.warning {
        color: #e71d36 !important;
      }
      #timer.ok {
        color: #2ec4b6;
      }
      .q-nav-btn {
        width: 36px;
        height: 36px;
        padding: 0;
        font-size: 0.8rem;
        font-weight: 600;
        border-radius: 0.45rem !important;
      }
    </style>
  </head>
  <body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
          <i class="fas fa-graduation-cap me-2"></i>QuizWeb
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white fw-semibold" id="testSubject"></span>
          <a
            href="dashboard.html"
            class="btn btn-outline-light btn-sm rounded-pill"
            onclick="
              return confirm('Testdan chiqmoqchimisiz? Natijalar saqlanmaydi!');
            ">
            <i class="fas fa-times me-1"></i>Chiqish
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <!-- Timer & Progress -->
      <div class="row mb-3 g-3">
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3 h-100">
            <div
              class="card-body p-3 text-center d-flex flex-column justify-content-center">
              <small class="text-muted d-block mb-1">⏱ Qolgan vaqt</small>
              <div id="timer" class="ok">50:00</div>
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card border-0 shadow-sm rounded-3 h-100">
            <div
              class="card-body p-3 d-flex flex-column justify-content-center">
              <div class="d-flex justify-content-between mb-1">
                <small class="fw-semibold" id="stageLabel">Bosqich 1</small>
                <small class="text-primary fw-bold" id="progressText"
                  >0 / 0</small
                >
              </div>
              <div class="progress" style="height: 10px; border-radius: 10px">
                <div
                  class="progress-bar bg-primary progress-bar-striped progress-bar-animated"
                  id="progressBar"
                  style="width: 0%; border-radius: 10px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4" id="questionCard">
            <div class="card-body p-4 p-md-5">
              <div
                class="d-flex justify-content-between align-items-center mb-3">
                <span
                  class="badge bg-primary rounded-pill fs-6"
                  id="questionNumber"
                  >Savol 1</span
                >
                <span class="text-muted small" id="questionCount"></span>
              </div>

              <h5 class="fw-bold mb-4" id="questionText">Yuklanmoqda...</h5>

              <div id="optionsContainer" class="d-flex flex-column gap-2 mb-4">
                <!-- Options rendered here -->
              </div>

              <div class="d-flex justify-content-between">
                <button
                  class="btn btn-outline-secondary rounded-pill px-4"
                  id="prevBtn"
                  onclick="prevQuestion()"
                  disabled>
                  <i class="fas fa-arrow-left me-1"></i>Oldingi
                </button>
                <button
                  class="btn btn-primary rounded-pill px-4"
                  id="nextBtn"
                  onclick="nextQuestion()">
                  Keyingi<i class="fas fa-arrow-right ms-1"></i>
                </button>
                <button
                  class="btn btn-success rounded-pill px-4 d-none"
                  id="finishBtn"
                  onclick="finishStage()">
                  <i class="fas fa-check me-1"></i>Tugatish
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Navigator -->
      <div class="row justify-content-center mt-3">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
              <h6 class="fw-bold mb-2">
                <i class="fas fa-th me-2"></i>Savollar xaritasi
                <span class="text-muted small fw-normal ms-2">
                  <span class="badge bg-primary">Joriy</span>
                  <span class="badge bg-success ms-1">Javob berilgan</span>
                  <span class="badge bg-secondary ms-1">Javob berilmagan</span>
                </span>
              </h6>
              <div class="d-flex flex-wrap gap-2" id="questionNav"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) window.location.href = "login.html";

      const test = JSON.parse(localStorage.getItem("currentTest"));
      if (!test) window.location.href = "dashboard.html";

      document.getElementById("testSubject").textContent = test.subject;

      // Prepare questions — shuffle ORDER of questions, but fix option order per question
      const QUESTIONS_PER_STAGE = 50;
      const STAGE_SECONDS = 50 * 60;
      const allQuestions = [...test.questions].sort(() => Math.random() - 0.5);
      const stages = [];
      for (let i = 0; i < allQuestions.length; i += QUESTIONS_PER_STAGE) {
        stages.push(allQuestions.slice(i, i + QUESTIONS_PER_STAGE));
      }

      const questionOptionsByStage = stages.map((stage) =>
        stage.map((q) => [...q.options].sort(() => Math.random() - 0.5)),
      );
      const answersByStage = stages.map((stage) =>
        new Array(stage.length).fill(null),
      );
      const stageDurations = new Array(stages.length).fill(0);

      let currentStage = 0;
      let currentQ = 0;
      let timerInterval;
      let timeLeft = STAGE_SECONDS;
      let audioContext;

      function playTone(type = "tap") {
        try {
          audioContext =
            audioContext || new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const gain = audioContext.createGain();
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
          gain.connect(audioContext.destination);

          const tones =
            {
              success: [523.25, 659.25, 783.99],
              fail: [220, 185, 164.81],
              finish: [523.25, 659.25, 783.99],
              move: [440, 554.37],
              tap: [659.25, 880],
            }[type] || [659.25, 880];

          tones.forEach((frequency, index) => {
            const oscillator = audioContext.createOscillator();
            oscillator.type = "sine";
            oscillator.frequency.setValueAtTime(frequency, now + index * 0.055);
            oscillator.connect(gain);
            oscillator.start(now + index * 0.055);
            oscillator.stop(now + index * 0.055 + 0.12);
          });
        } catch (error) {
          // Sound feedback is optional; ignore browsers that block it.
        }
      }

      // Build question navigator
      const navContainer = document.getElementById("questionNav");
      function getStageQuestions() {
        return stages[currentStage];
      }

      function getStageOptions() {
        return questionOptionsByStage[currentStage];
      }

      function getStageAnswers() {
        return answersByStage[currentStage];
      }

      function getTotalAnswered() {
        return answersByStage.reduce(
          (sum, answers) =>
            sum + answers.filter((answer) => answer !== null).length,
          0,
        );
      }

      function getStageStartIndex(stageIndex = currentStage) {
        return stages
          .slice(0, stageIndex)
          .reduce((sum, stage) => sum + stage.length, 0);
      }

      function vibrate(pattern) {
        if ("vibrate" in navigator) navigator.vibrate(pattern);
      }

      function buildQuestionNavigator() {
        navContainer.innerHTML = "";
        getStageQuestions().forEach((_, i) => {
          const btn = document.createElement("button");
          btn.className = "btn btn-sm q-nav-btn btn-outline-secondary";
          btn.dataset.index = i;
          btn.textContent = i + 1;
          btn.onclick = () => goToQuestion(i);
          navContainer.appendChild(btn);
        });
      }

      function renderQuestion() {
        const stageQuestions = getStageQuestions();
        const totalQ = stageQuestions.length;
        const stageAnswers = getStageAnswers();
        const q = stageQuestions[currentQ];
        const globalQuestionNumber = getStageStartIndex() + currentQ + 1;

        document.getElementById("questionNumber").textContent =
          `Savol ${globalQuestionNumber}`;
        document.getElementById("questionCount").textContent =
          `${currentQ + 1} / ${totalQ}`;
        document.getElementById("questionText").textContent = q.question;
        document.getElementById("stageLabel").textContent =
          stages.length > 1
            ? `Bosqich ${currentStage + 1} / ${stages.length}`
            : "Javob berilgan savollar";

        // Use the PRE-SHUFFLED options for this question (never re-shuffle)
        const opts = getStageOptions()[currentQ];
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";

        opts.forEach((opt) => {
          const selectedLetter = stageAnswers[currentQ];
          const isSelected = selectedLetter === opt.letter;
          const isAnswered = selectedLetter !== null;
          const isCorrectOption = opt.letter === q.correctAnswer;
          const isWrongSelected = isAnswered && isSelected && !isCorrectOption;
          const btn = document.createElement("button");
          btn.className = "option-btn";
          if (!isAnswered && isSelected) btn.classList.add("selected");
          if (isAnswered && isCorrectOption) btn.classList.add("correct");
          if (isWrongSelected) btn.classList.add("incorrect");
          btn.dataset.letter = opt.letter;
          btn.innerHTML = `<span>${opt.text}</span>`;
          btn.disabled = isAnswered;
          btn.onclick = () => selectAnswer(opt.letter);
          container.appendChild(btn);
        });

        // Navigation buttons
        document.getElementById("prevBtn").disabled = currentQ === 0;
        if (currentQ === totalQ - 1) {
          document.getElementById("nextBtn").classList.add("d-none");
          document.getElementById("finishBtn").classList.remove("d-none");
        } else {
          document.getElementById("nextBtn").classList.remove("d-none");
          document.getElementById("finishBtn").classList.add("d-none");
        }

        updateProgress();
        updateNav();
      }

      function selectAnswer(letter) {
        const stageAnswers = getStageAnswers();
        if (stageAnswers[currentQ] !== null) return;

        const question = getStageQuestions()[currentQ];
        const isCorrect = letter === question.correctAnswer;
        stageAnswers[currentQ] = letter;
        playTone(isCorrect ? "success" : "fail");
        vibrate(isCorrect ? 60 : [90, 50, 120]);

        renderQuestion();

        updateProgress();
        updateNav();
      }

      function nextQuestion() {
        if (currentQ < getStageQuestions().length - 1) {
          currentQ++;
          playTone("move");
          renderQuestion();
        }
      }

      function prevQuestion() {
        if (currentQ > 0) {
          currentQ--;
          playTone("move");
          renderQuestion();
        }
      }

      function goToQuestion(idx) {
        currentQ = idx;
        playTone("move");
        renderQuestion();
      }

      function updateProgress() {
        const stageAnswers = getStageAnswers();
        const answered = stageAnswers.filter((a) => a !== null).length;
        const pct = (answered / stageAnswers.length) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          stages.length > 1
            ? `${answered} / ${stageAnswers.length} (jami ${getTotalAnswered()} / ${allQuestions.length})`
            : `${answered} / ${stageAnswers.length}`;
      }

      function updateNav() {
        const stageAnswers = getStageAnswers();
        document.querySelectorAll(".q-nav-btn").forEach((btn) => {
          const idx = parseInt(btn.dataset.index);
          btn.className = "btn btn-sm q-nav-btn";
          if (idx === currentQ) btn.classList.add("btn-primary");
          else if (stageAnswers[idx] !== null) btn.classList.add("btn-success");
          else btn.classList.add("btn-outline-secondary");
        });
      }

      // ================= TIMER =================
      function updateTimerDisplay() {
        const min = Math.floor(timeLeft / 60)
          .toString()
          .padStart(2, "0");
        const sec = (timeLeft % 60).toString().padStart(2, "0");
        const el = document.getElementById("timer");
        el.textContent = `${min}:${sec}`;
        if (timeLeft <= 300) {
          // last 5 min
          el.className = "warning";
        } else if (timeLeft <= 600) {
          // last 10 min
          el.className = "text-warning fw-bold";
        } else {
          el.className = "ok";
        }
      }

      function startTimer() {
        clearInterval(timerInterval);
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("Vaqt tugadi! Bosqich avtomatik yakunlanmoqda...");
            finishStage();
          }
        }, 1000);
      }

      // ================= FINISH =================
      function finishStage() {
        clearInterval(timerInterval);
        stageDurations[currentStage] = STAGE_SECONDS - timeLeft;

        if (currentStage < stages.length - 1) {
          playTone("finish");
          const nextStage = currentStage + 2;
          const shouldContinue = confirm(
            `Bosqich ${currentStage + 1} tugadi. Keyingi bosqich (${nextStage}/${stages.length}) boshlansinmi?`,
          );

          if (shouldContinue) {
            currentStage++;
            currentQ = 0;
            timeLeft = STAGE_SECONDS;
            buildQuestionNavigator();
            renderQuestion();
            startTimer();
          } else {
            finishTest();
          }
          return;
        }

        finishTest();
      }

      function finishTest() {
        clearInterval(timerInterval);
        stageDurations[currentStage] = Math.max(
          stageDurations[currentStage],
          STAGE_SECONDS - timeLeft,
        );
        playTone("finish");

        let correct = 0,
          wrong = 0,
          unanswered = 0;
        const details = [];

        stages.forEach((stage, stageIndex) => {
          stage.forEach((q, questionIndex) => {
            const userAnswer = answersByStage[stageIndex][questionIndex];
            const isCorrect = userAnswer === q.correctAnswer;
            if (isCorrect) correct++;
            else if (userAnswer === null) unanswered++;
            else wrong++;

            details.push({
              question: q.question,
              userAnswer,
              correctAnswer: q.correctAnswer,
              userAnswerText:
                q.options.find((option) => option.letter === userAnswer)?.text ||
                null,
              correctAnswerText:
                q.options.find((option) => option.letter === q.correctAnswer)
                  ?.text || "",
              isCorrect,
              options: questionOptionsByStage[stageIndex][questionIndex],
              stage: stageIndex + 1,
            });
          });
        });

        const percentage = Math.round((correct / allQuestions.length) * 100);
        const timeSpent = stageDurations.reduce(
          (sum, duration) => sum + duration,
          0,
        );
        const minutes = Math.floor(timeSpent / 60);
        const seconds = timeSpent % 60;

        const result = {
          resultId: "result_" + Date.now(),
          testId: test.id,
          subject: test.subject,
          totalQuestions: allQuestions.length,
          totalStages: stages.length,
          correct,
          wrong,
          unanswered,
          percentage,
          timeSpent: `${minutes}m ${seconds}s`,
          details,
          answers: answersByStage.flat(),
          selectedQuestions: allQuestions,
          completedAt: new Date().toISOString(),
        };

        const completed = JSON.parse(
          localStorage.getItem("completed_" + user.email) || "[]",
        );
        completed.push(result);
        localStorage.setItem(
          "completed_" + user.email,
          JSON.stringify(completed),
        );
        localStorage.setItem("currentResult", JSON.stringify(result));

        setTimeout(() => {
          window.location.href = "result.html";
        }, 220);
      }

      // ================= INIT =================
      buildQuestionNavigator();
      renderQuestion();
      startTimer();
    </script>
  </body>
</html>
